<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Photos | G10</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 80px;">

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">GROUPE 10</a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-acnh btn-acnh-primary rounded-pill btn-sm">
                    <i class="ph-bold ph-arrow-left me-2"></i>Retour
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-3 fw-bold" style="color: var(--green-main);">Nos Photos</h1>
            <p class="lead opacity-75">Quelques images de notre machine et de l'équipe tout au long du projet.</p>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 justify-content-center">
            
            <div class="col">
                <div class="acnh-bubble p-2 h-100 shadow-sm bg-white">
                    <img src="images/chassis.png" class="img-fluid rounded-4 w-100" style="object-fit: cover; height: 250px;" alt="Chassis" onerror="this.src='https://placehold.co/400x300/eee/999?text=Chassis'">
                </div>
            </div>
            
            <div class="col">
                <div class="acnh-bubble p-2 h-100 shadow-sm bg-white">
                    <img src="images/cnc.png" class="img-fluid rounded-4 w-100" style="object-fit: cover; height: 250px;" alt="Machine CNC" onerror="this.src='https://placehold.co/400x300/eee/999?text=CNC'">
                </div>
            </div>
            
            <div class="col">
                <div class="acnh-bubble p-2 h-100 shadow-sm bg-white">
                    <img src="images/dessine.png" class="img-fluid rounded-4 w-100" style="object-fit: cover; height: 250px;" alt="Machine qui dessine" onerror="this.src='https://placehold.co/400x300/eee/999?text=Dessine'">
                </div>
            </div>
            
            <div class="col">
                <div class="acnh-bubble p-2 h-100 shadow-sm bg-white">
                    <img src="images/grp.jpg" class="img-fluid rounded-4 w-100" style="object-fit: cover; height: 250px;" alt="Photo de groupe" onerror="this.src='https://placehold.co/400x300/eee/999?text=Groupe'">
                </div>
            </div>
            
            <div class="col">
                <div class="acnh-bubble p-2 h-100 shadow-sm bg-white">
                    <img src="images/start.png" class="img-fluid rounded-4 w-100" style="object-fit: cover; height: 250px;" alt="Start machine" onerror="this.src='https://placehold.co/400x300/eee/999?text=Start'">
                </div>
            </div>
            
            <div class="col">
                <div class="acnh-bubble p-2 h-100 shadow-sm bg-white">
                    <img src="images/taff.png" class="img-fluid rounded-4 w-100" style="object-fit: cover; height: 250px;" alt="Travail en cours" onerror="this.src='https://placehold.co/400x300/eee/999?text=Taff'">
                </div>
            </div>
            
            <div class="col">
                <div class="acnh-bubble p-2 h-100 shadow-sm bg-white">
                    <img src="images/victory.jpg" class="img-fluid rounded-4 w-100" style="object-fit: cover; height: 250px;" alt="Victoire et accomplissement" onerror="this.src='https://placehold.co/400x300/eee/999?text=Victory'">
                </div>
            </div>

        </div>
    </div>
</body>
</html>
